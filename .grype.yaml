# Grype configuration for Distillery supply chain scanning.
# See: https://github.com/anchore/grype#configuration
#
# False-positive suppressions go in the 'ignore' list below.
# Each entry must include a reason explaining why the CVE is safe to ignore.
#
# Scoping policy: every ignore entry MUST be bound to the exact package
# (name + version, with type when known) that grype emits.  This prevents
# the suppression from silently matching a future occurrence of the same
# CVE-ID in a different package and weakening the fail-on-severity gate.
# The package.name / package.version / package.type strings come straight
# from the SBOM (artifact.name / artifact.version / artifact.type fields
# in the grype JSON report) — for Wolfi apk packages that means values
# like "python-3.14" (not "CPython") and "glibc".
#
# Audit policy: every entry is reviewed against the current scan output
# (see issue #418).  Entries are removed when grype no longer matches them
# in the latest CI scan — either because the affected package was upgraded
# in Wolfi, removed from the runtime image, or the upstream backport landed
# in a recent base-image rebuild.  This keeps the file aligned with what
# grype actually emits and prevents drift between rationale and reality.
#
# Example:
#   ignore:
#     - vulnerability: CVE-2024-XXXXX
#       package:
#         name: example-pkg
#         version: 1.2.3-r0
#         type: apk
#       reason: "Not exploitable in our context — we don't use the affected API"

ignore:
  # ---------------------------------------------------------------------
  # Active suppressions — confirmed against the CI scan of the python-3.14
  # runtime image (SBOM: python-3.14.4-r4 + glibc 2.43-r7, Chainguard
  # distroless `cgr.dev/chainguard/python` base, which is built on Wolfi).
  # Refreshed: 2026-05-15 (issue #271, checking for new CVEs; individual CVE review dates in each entry's reason field).
  # ---------------------------------------------------------------------

  - vulnerability: CVE-2026-7210
    package:
      name: python-3.14
      version: 3.14.5-r1
      type: apk
    reason: "CPython 3.14.5-r1 — CVSS Critical; libexpat hash-flooding: xml.parsers.expat and xml.etree.ElementTree use insufficient entropy for hash-flooding protection, so a crafted XML document can trigger a hash-collision DoS.  Distillery parses feed XML, so this is a real but DoS-only exposure; defusedxml guards XXE / entity expansion but not expat's hash entropy.  No upstream fix available: full mitigation requires libexpat >= 2.8.0 plus a CPython patch, and neither Wolfi nor CPython has released a fixed python-3.14 build.  Grype matched via NVD CPE with no version constraint.  Revisit on the next Chainguard base-image rebuild.  Reviewed: 2026-05-17"


# Fail on critical and high severity vulnerabilities.
# This is also enforced in the CI workflow via --severity-cutoff=high,
# but defining it here ensures consistent behavior for local scans.
fail-on-severity: high

# Output format for local scans (CI overrides this via --output-format).
output: table
