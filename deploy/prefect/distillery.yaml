# Horizon-ready Distillery configuration — production deployment with MotherDuck storage.
#
# Purpose: This is the production configuration for deploying Distillery to Prefect Horizon
# or other hosted environments. It uses MotherDuck for shared cloud storage (enabling
# multiple replicas to access the same database) and GitHub OAuth for authentication.
#
# For local development, use distillery-dev.yaml instead (local DuckDB file, no auth).
#
# MotherDuck provides shared cloud storage so all Horizon replicas read from and write
# to the same DuckDB database. MOTHERDUCK_TOKEN is injected by Horizon from the secrets
# dashboard.
storage:
  backend: motherduck
  database_path: md:distillery
  motherduck_token_env: MOTHERDUCK_TOKEN

embedding:
  provider: jina
  model: jina-embeddings-v3
  dimensions: 1024
  api_key_env: JINA_API_KEY

team:
  name: ""

classification:
  confidence_threshold: 0.6
  dedup_skip_threshold: 0.95
  dedup_merge_threshold: 0.80
  dedup_link_threshold: 0.60
  dedup_limit: 5

tags:
  enforce_namespaces: false
  reserved_prefixes: []

# GitHub OAuth for HTTP transport.
# Setup instructions: See docs/deployment.md for step-by-step guide to:
#   1. Register a GitHub OAuth App at https://github.com/settings/developers
#   2. Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET environment variables
#   3. Configure callback URL to match your deployment URL
# When deployed to Horizon, the Horizon Gateway layers additional RBAC on top
# of the GitHubProvider below.  GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET are
# injected by Horizon from the secrets dashboard.
server:
  auth:
    provider: github
    client_id_env: GITHUB_CLIENT_ID
    client_secret_env: GITHUB_CLIENT_SECRET
    # Restrict access to GitHub org members (optional).
    # Users must be a member of at least one listed org to access the server.
    # Also configurable via DISTILLERY_ALLOWED_ORGS=my-org,other-org env var
    # (env values are merged with YAML values).
    # For private org support, set GITHUB_ORG_CHECK_TOKEN to a PAT with read:org scope.
    # allowed_orgs:
    #   - my-company
    # membership_cache_ttl_seconds: 3600  # default: 1 hour
