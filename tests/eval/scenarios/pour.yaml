      entry_type: session
      author: bob
      tags: [deduplication]
    - content: "Dedup accuracy was validated on 500 entries — 97% correct classification."
      entry_type: session
      author: alice
      tags: [deduplication, testing]
  expected_tools:
    - distillery_search
  min_entries_retrieved: 1
  max_latency_ms: 120000
  max_total_tokens: 12000

- name: pour-empty-store-no-crash
  skill: pour
