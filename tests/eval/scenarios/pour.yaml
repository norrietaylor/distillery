# Eval scenarios for the /pour skill.
# Pour synthesizes multiple entries into a coherent narrative.

- name: pour-synthesizes-architecture-topic
  skill: pour
  description: "Claude should search multiple times and synthesize findings about architecture"
  prompt: "/pour what's the full picture on the storage architecture decisions?"
  seed_entries:
    - content: "Decided to use DuckDB for local storage because it requires no separate server process."
      entry_type: session
      author: alice
      tags: [architecture, storage, duckdb]
    - content: "Chose cosine similarity over L2 distance for vector search — 15% more accurate on our benchmarks."
      entry_type: session
      author: alice
      tags: [architecture, search]
    - content: "DuckDB VSS extension documentation — covers HNSW index creation and cosine similarity."
      entry_type: bookmark
      author: alice
      tags: [reference, duckdb]
    - content: "Architecture review meeting 2026-03-10: DuckDB confirmed as the storage backend."
      entry_type: minutes
      author: carol
      tags: [meeting, architecture]
  expected_tools:
    - distillery_metrics
    - distillery_search
  min_entries_retrieved: 1
  max_latency_ms: 120000
  max_total_tokens: 12000

