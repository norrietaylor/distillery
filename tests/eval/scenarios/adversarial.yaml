  max_total_tokens: 8000

# ── Boundary conditions ───────────────────────────────────────────────────────

- name: adversarial-boundary-link-threshold
  skill: distill
  category: boundary_condition
  description: "Entries at exact 0.60 similarity (link threshold) — dedup should classify as 'link'"
  prompt: '/distill "We use Python 3.11 as the minimum supported runtime version for this project."'
  seed_entries:
    - content: "Python 3.11 is the minimum runtime version required for type-narrowing features."
      entry_type: session
      author: alice
      tags: [python, requirements]
  expected_tools:
    - distillery_status
    - distillery_check_dedup
  response_must_contain:
    - similar
  response_must_not_contain:
    - Traceback
    - Exception
    - internal error
    - "Error:"
  max_latency_ms: 90000
  max_total_tokens: 10000

- name: adversarial-boundary-merge-threshold
  skill: distill
  category: boundary_condition
  description: "Entries at exact 0.80 similarity (merge threshold) — dedup should classify as 'merge'"
  prompt: '/distill "Decided to use DuckDB for local storage because it needs no server process."'
  seed_entries:
    - content: "Decided to use DuckDB for local storage because it requires no separate server process."
      entry_type: session
      author: alice
      tags: [architecture, duckdb]
  expected_tools:
    - distillery_status
    - distillery_check_dedup
  response_must_contain:
    - duplicate
  response_must_not_contain:
    - Traceback
    - Exception
    - internal error
    - "Error:"
  max_latency_ms: 90000
  max_total_tokens: 10000

- name: adversarial-boundary-skip-threshold
  skill: distill
  category: boundary_condition
  description: "Entries at exact 0.95 similarity (skip threshold) — dedup should classify as 'skip'"
  prompt: '/distill "Decided to use DuckDB for local storage because it requires no separate server process."'
  seed_entries:
    - content: "Decided to use DuckDB for local storage because it requires no separate server process."
      entry_type: session
      author: alice
      tags: [architecture, duckdb]
  expected_tools:
    - distillery_status
    - distillery_check_dedup
  response_must_contain:
    - already
  response_must_not_contain:
    - Traceback
    - Exception
    - internal error
    - "Error:"
  max_latency_ms: 90000
  max_total_tokens: 10000
