- name: adversarial-pour-empty-store
  skill: pour
  category: empty_store
  description: "/pour synthesis with no matching entries — expect graceful 'insufficient data' message"
  prompt: "/pour what patterns exist in our authentication decisions?"
  seed_entries: []
  expected_tools:
