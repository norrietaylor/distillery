- name: adversarial-recall-unicode-edge-cases
  skill: recall
  category: malformed_input
  description: "Unicode edge cases (RTL text, zero-width chars, emoji sequences) to /recall — should not crash"
  prompt: "/recall \u202Edesign decisions\u202C with \u200Bzero-width spaces and emoji \U0001F4DA\U0001F50D"
  seed_entries:
    - content: "Decided to use DuckDB for local storage because it has excellent Python bindings."
      entry_type: session
      author: alice
      tags: [architecture, storage]
  expected_tools:
    - distillery_status
    - distillery_search
  response_must_contain:
    - DuckDB
  response_must_not_contain:
    - Traceback
    - Exception
    - internal error
    - "Error:"
  min_entries_retrieved: 0
  max_latency_ms: 60000
  max_total_tokens: 8000

