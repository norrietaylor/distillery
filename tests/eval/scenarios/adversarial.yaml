# Eval scenarios for adversarial and edge-case conditions.
# Covers malformed input, empty store behaviour, and deduplication boundary conditions.

# ── Malformed input ──────────────────────────────────────────────────────────

- name: adversarial-distill-empty-string
  skill: distill
  category: malformed_input
  description: "Empty string prompt to /distill — Claude should explain there is nothing to store"
  prompt: '/distill ""'
  seed_entries: []
  expected_tools:
    - distillery_status
  response_must_contain:
    - nothing to store
  response_must_not_contain:
    - Traceback
    - Exception
    - internal error
    - "Error:"
  max_latency_ms: 60000
  max_total_tokens: 8000

- name: adversarial-distill-long-content
