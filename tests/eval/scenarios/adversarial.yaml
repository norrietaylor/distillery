  prompt: "what caching strategies have we discussed?"
  seed_entries: []
  expected_tools:
    - distillery_status
    - distillery_search
  response_must_contain:
    - no results
  response_must_not_contain:
    - Traceback
    - Exception
    - internal error
    - "Error:"
  min_entries_retrieved: 0
  max_latency_ms: 60000
