# promptfooconfig.yaml — Distillery PR CI Gate
#
# Fast smoke-test suite (5-10 scenarios) covering critical skill paths.
# Runs on every PR via .github/workflows/eval-pr.yml.
#
# Provider: Claude CLI (OAuth) with Distillery MCP server (stdio)
# Run: npx promptfoo@latest eval --config promptfooconfig.yaml
#
# Each scenario asserts tool calls were made OR the response indicates
# the skill executed successfully (resilient to LLM non-determinism).

description: "Distillery MCP smoke-test suite for PR CI gate"

# ---------------------------------------------------------------------------
# Provider: Claude CLI with Distillery MCP server (uses CLAUDE_CODE_OAUTH_TOKEN)
#
# We use a Python provider that invokes the `claude` CLI, which authenticates
# via CLAUDE_CODE_OAUTH_TOKEN (OAuth). The direct `anthropic:messages:*`
# provider requires ANTHROPIC_API_KEY which we don't have in CI.
# ---------------------------------------------------------------------------
providers:
  - id: "python:scripts/promptfoo_provider.py"
    label: claude-with-distillery-mcp

# ---------------------------------------------------------------------------
# Prompt template — passed to the Python provider's call_api(prompt, ...)
# The Claude CLI has MCP tools available; no system prompt override needed.
# ---------------------------------------------------------------------------
prompts:
  - "You are a Distillery knowledge assistant. Use the available distillery MCP tools to fulfill the user's request. Always call distillery_status first to confirm connectivity.\n\n{{prompt}}"

# ---------------------------------------------------------------------------
# Default assertions applied to every test (can be overridden per test)
# ---------------------------------------------------------------------------
defaultTest:
  assert:
    - type: latency
      threshold: 120000   # 2 minutes max per scenario
    - type: not-regex
      value: "(?i)(traceback|exception at |internal error|500 error)"

# ---------------------------------------------------------------------------
# Smoke-test scenarios
#
# Assertions check: tool calls made OR response content proves the skill
# executed correctly. This is resilient to cases where the LLM uses tools
# but the stream parser misses them, or where the LLM answers directly.
# ---------------------------------------------------------------------------
tests:
  # ---- /distill: store a new knowledge entry --------------------------------
  - description: "distill stores a new session entry via distillery_store"
    vars:
      prompt: '/distill "We decided to use pytest-asyncio in auto mode so async tests are detected automatically without needing @pytest.mark.asyncio on each function."'
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.some(n => ['distillery_status', 'distillery_store', 'distillery_check_dedup'].includes(n));
          const hasContent = /stored|saved|entry.*id|created/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected distillery tool call or confirmation of stored entry';

  # ---- /distill: deduplication check before store ---------------------------
  - description: "distill checks for duplicates before storing similar content"
    vars:
      prompt: '/distill "Decided to use DuckDB for local storage because it has no server process."'
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.some(n => ['distillery_status', 'distillery_check_dedup', 'distillery_store'].includes(n));
          const hasContent = /stored|saved|entry.*id|created|duplicate|dedup/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected distillery tool call or confirmation of stored entry';

  # ---- /recall: search for existing knowledge entries -----------------------
  - description: "recall searches knowledge base and returns relevant entries"
    vars:
      prompt: "what storage engine do we use and why did we choose it?"
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.includes('distillery_search');
          const hasContent = /duckdb|storage|database/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected search tool call or relevant content about storage';

  # ---- /recall: graceful empty store response -------------------------------
  - description: "recall handles empty knowledge base gracefully"
    vars:
      prompt: "what do we know about caching strategies?"
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.includes('distillery_search');
          const hasContent = /no.*(?:entries|results|information|data)|knowledge base|search/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected search tool call or graceful empty-store response';

  # ---- /bookmark: store a URL as a bookmark entry ---------------------------
  - description: "bookmark stores a URL with entry_type=bookmark via distillery_store"
    vars:
      prompt: '/bookmark https://duckdb.org/docs/extensions/vss "DuckDB VSS extension docs — HNSW index creation and cosine similarity"'
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.some(n => ['distillery_status', 'distillery_store', 'distillery_check_dedup'].includes(n));
          const hasContent = /bookmark|stored|saved|entry.*id/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected distillery tool call or bookmark confirmation';

  # ---- /bookmark: dedup check for known URL ---------------------------------
  - description: "bookmark checks dedup before storing a known URL"
    vars:
      prompt: '/bookmark https://duckdb.org/docs/extensions/vss "DuckDB vector similarity search extension"'
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.some(n => ['distillery_check_dedup', 'distillery_store', 'distillery_status'].includes(n));
          const hasContent = /bookmark|stored|saved|duplicate|already|entry.*id/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected dedup check or bookmark confirmation';

  # ---- /pour: synthesize entries into a narrative ---------------------------
  - description: "pour searches and synthesizes knowledge into a coherent narrative"
    vars:
      prompt: "/pour what's the full picture on the storage architecture decisions?"
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.includes('distillery_search');
          const hasContent = /storage|architecture|duckdb|decision/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected search tool call or synthesized content about storage';

  # ---- /pour: graceful with sparse data -------------------------------------
  - description: "pour handles sparse knowledge base without crashing"
    vars:
      prompt: "/pour decision log"
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.includes('distillery_search');
          const hasContent = /decision|log|no.*(?:entries|results)|knowledge/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected search tool call or decision log content';

  # ---- /watch: list configured feed sources ---------------------------------
  - description: "watch list reports configured feed sources via distillery_watch"
    vars:
      prompt: "/watch list"
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.some(n => ['distillery_watch', 'distillery_status'].includes(n));
          const hasContent = /feed.*source|watch|no.*(?:sources|feeds)|configured|empty/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected watch tool call or feed source listing';

  # ---- /watch: add RSS feed source ------------------------------------------
  - description: "watch add registers a new RSS source via distillery_watch"
    vars:
      prompt: "/watch add https://news.ycombinator.com/rss --type rss --label 'Hacker News'"
    assert:
      - type: javascript
        value: |
          const tc = output?.tool_calls ?? [];
          const names = tc.map(t => t.name ?? '');
          const text = output?.text ?? (typeof output === 'string' ? output : '');
          const hasTools = names.includes('distillery_watch');
          const hasContent = /added|registered|hacker news|rss|feed.*source/i.test(text);
          return (hasTools || hasContent) ? true : 'Expected watch tool call or feed source added confirmation';

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------
outputPath: .promptfoo/results.json
