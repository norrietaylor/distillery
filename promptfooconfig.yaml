# promptfooconfig.yaml — Distillery PR CI Gate
#
# Fast smoke-test suite (5-10 scenarios) covering critical skill paths.
# Runs on every PR via .github/workflows/eval-pr.yml.
#
# Provider: Claude CLI (OAuth) with Distillery MCP server (stdio)
# Run: npx promptfoo@latest eval --config promptfooconfig.yaml
#
# Each scenario asserts tool calls were made OR the response indicates
# the skill executed successfully (resilient to LLM non-determinism).

description: "Distillery MCP smoke-test suite for PR CI gate"

# ---------------------------------------------------------------------------
# Provider: Claude CLI with Distillery MCP server (uses CLAUDE_CODE_OAUTH_TOKEN)
# ---------------------------------------------------------------------------
providers:
  - id: "python:scripts/promptfoo_provider.py"
    label: claude-with-distillery-mcp

# ---------------------------------------------------------------------------
# Prompt template
# ---------------------------------------------------------------------------
prompts:
  - "You are a Distillery knowledge assistant. Use the available distillery MCP tools to fulfill the user's request. Always call distillery_status first to confirm connectivity.\n\n{{prompt}}"

# ---------------------------------------------------------------------------
# Default assertions
# ---------------------------------------------------------------------------
defaultTest:
  assert:
    - type: latency
      threshold: 120000

# ---------------------------------------------------------------------------
# Helper: all javascript assertions use this parse pattern to handle output
# being either an object {text, tool_calls} or a JSON string.
# ---------------------------------------------------------------------------
tests:
  # ---- /distill: store a new knowledge entry --------------------------------
  - description: "distill stores a new session entry via distillery_store"
    vars:
      prompt: '/distill "We decided to use pytest-asyncio in auto mode so async tests are detected automatically without needing @pytest.mark.asyncio on each function."'
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.some(n => ['distillery_status','distillery_store','distillery_check_dedup'].includes(n)) || /stored|saved|entry.*id|created/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

  # ---- /distill: dedup check before store -----------------------------------
  - description: "distill checks for duplicates before storing similar content"
    vars:
      prompt: '/distill "Decided to use DuckDB for local storage because it has no server process."'
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.some(n => ['distillery_status','distillery_check_dedup','distillery_store'].includes(n)) || /stored|saved|entry.*id|created|duplicate|dedup/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

  # ---- /recall: search for existing knowledge entries -----------------------
  - description: "recall searches knowledge base and returns relevant entries"
    vars:
      prompt: "what storage engine do we use and why did we choose it?"
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.includes('distillery_search') || /duckdb|storage|database/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

  # ---- /recall: graceful empty store response -------------------------------
  - description: "recall handles empty knowledge base gracefully"
    vars:
      prompt: "what do we know about caching strategies?"
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.includes('distillery_search') || /no.*(?:entries|results|information|data)|knowledge base|search|cach|doesn.t have/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;
      - type: not-regex
        value: "(?i)(traceback|exception at |internal error|500 error)"

  # ---- /bookmark: store a URL as a bookmark entry ---------------------------
  - description: "bookmark stores a URL with entry_type=bookmark via distillery_store"
    vars:
      prompt: '/bookmark https://duckdb.org/docs/extensions/vss "DuckDB VSS extension docs — HNSW index creation and cosine similarity"'
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.some(n => ['distillery_status','distillery_store','distillery_check_dedup'].includes(n)) || /bookmark|stored|saved|entry.*id/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

  # ---- /bookmark: dedup check for known URL ---------------------------------
  - description: "bookmark checks dedup before storing a known URL"
    vars:
      prompt: '/bookmark https://duckdb.org/docs/extensions/vss "DuckDB vector similarity search extension"'
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.some(n => ['distillery_check_dedup','distillery_store','distillery_status'].includes(n)) || /bookmark|stored|saved|duplicate|already|entry.*id/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

  # ---- /pour: synthesize entries into a narrative ---------------------------
  - description: "pour searches and synthesizes knowledge into a coherent narrative"
    vars:
      prompt: "/pour what's the full picture on the storage architecture decisions?"
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.includes('distillery_search') || /storage|architecture|duckdb|decision/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

  # ---- /pour: graceful with sparse data -------------------------------------
  - description: "pour handles sparse knowledge base without crashing"
    vars:
      prompt: "/pour decision log"
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.includes('distillery_search') || /decision|log|no.*(?:entries|results)|knowledge|pour|synthe/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;
      - type: not-regex
        value: "(?i)(traceback|exception at |internal error|500 error)"

  # ---- /watch: list configured feed sources ---------------------------------
  - description: "watch list reports configured feed sources via distillery_watch"
    vars:
      prompt: "/watch list"
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.some(n => ['distillery_watch','distillery_status'].includes(n)) || /feed.*source|watch|no.*(?:sources|feeds)|configured|empty/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

  # ---- /watch: add RSS feed source ------------------------------------------
  - description: "watch add registers a new RSS source via distillery_watch"
    vars:
      prompt: "/watch add https://news.ycombinator.com/rss --type rss --label 'Hacker News'"
    assert:
      - type: javascript
        value: |
          let p = output; if (typeof output === 'string') { try { p = JSON.parse(output); } catch(e) { p = {text: output}; } }
          const names = (p?.tool_calls ?? []).map(t => t.name ?? '');
          const text = p?.text ?? (typeof output === 'string' ? output : JSON.stringify(output));
          const ok = names.includes('distillery_watch') || /added|registered|hacker news|rss|feed.*source/i.test(text);
          return ok ? true : `FAIL: type=${typeof output}, text=${text.substring(0,120)}`;

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------
outputPath: .promptfoo/results.json
