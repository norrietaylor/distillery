name: Deploy to Fly.io

on:
  workflow_run:
    workflows: ["Supply Chain Security"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Only deploy if the supply-chain workflow succeeded (or manual trigger)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: fly-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image digest
        id: resolve
        run: |
          SHORT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${SHORT_SHA::7}"
          TAG="sha-${SHORT_SHA}"
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/norrietaylor/distillery:${TAG}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved ghcr.io/norrietaylor/distillery:${TAG} -> ${DIGEST}"

      - name: Deploy from GHCR image
        run: |
          flyctl deploy \
            -c deploy/fly/fly.toml \
            --image "ghcr.io/norrietaylor/distillery@${{ steps.resolve.outputs.digest }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
