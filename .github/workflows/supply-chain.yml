name: Supply Chain Security

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/norrietaylor/distillery

jobs:
  supply-chain:
    name: Scan (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fly
            dockerfile: deploy/fly/Dockerfile
            context: .
          # - target: prefect
          #   dockerfile: deploy/prefect/Dockerfile
          #   context: .

    outputs:
      digest-fly: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- GHCR login (push events only) ---
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Determine image tags ---
      - name: Determine image tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${TAG}"
          fi
          if [[ "$GITHUB_REF" == refs/heads/main ]]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      # --- Build image (always load locally for scanning) ---
      - name: Build image (local load)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: distillery-${{ matrix.target }}:scan
          build-args: |
            BUILD_SHA=${{ github.sha }}

      # --- SBOM generation ---
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: distillery-${{ matrix.target }}:scan
          format: cyclonedx-json
          output-file: sbom-${{ matrix.target }}.cdx.json
          artifact-name: sbom-${{ matrix.target }}

      # --- Vulnerability scanning ---
      - name: Scan for vulnerabilities (Grype)
        uses: anchore/scan-action@v4
        id: grype
        with:
          sbom: sbom-${{ matrix.target }}.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: json

      - name: Save Grype report
        if: always()
        run: |
          if [ -f "${{ steps.grype.outputs.json }}" ]; then
            cp "${{ steps.grype.outputs.json }}" grype-report-${{ matrix.target }}.json
          fi

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.target }}.cdx.json
          path: sbom-${{ matrix.target }}.cdx.json
          retention-days: 30

      - name: Upload Grype report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-report-${{ matrix.target }}.json
          path: grype-report-${{ matrix.target }}.json
          retention-days: 30

      # --- Push to GHCR (main/tags only, after scan passes) ---
      - name: Push image to GHCR
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_SHA=${{ github.sha }}

      # --- Container signing (Cosign keyless via Sigstore OIDC) ---
      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${DIGEST}"

      # --- In-toto attestations ---
      - name: Attest SBOM (CycloneDX)
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign attest --yes \
            --type cyclonedx \
            --predicate sbom-${{ matrix.target }}.cdx.json \
            "${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Attest vulnerability scan
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign attest --yes \
            --type vuln \
            --predicate grype-report-${{ matrix.target }}.json \
            "${{ env.IMAGE_NAME }}@${DIGEST}"

      # --- SLSA provenance ---
      - name: Attest build provenance (SLSA)
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
