name: CD — Deploy to AWS Lambda

# Trigger after CI passes on main
on:
  # Trigger after CI passes on main
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  # Allow manual trigger for re-deploys without a new push
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual redeploy"

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Required for AWS OIDC authentication

jobs:
  # Guard: only run when the triggering CI run succeeded (not on failures)
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Confirm deploy should proceed
        id: check
        run: echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  # Re-run tests to ensure we're deploying a verified commit
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check-ci
    if: needs.check-ci.outputs.should_deploy == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite (coverage threshold 80%)
        run: pytest --cov=src/distillery --cov-report=xml --cov-report=term-missing --cov-fail-under=80

  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # workflow_run trigger: github.sha is the default branch HEAD, not the
          # commit that triggered CI.  Use the triggering run's head_sha instead.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Authenticate to AWS using GitHub OIDC — no long-lived access keys stored
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/distillery-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          # workflow_run trigger: use the triggering CI run's commit SHA,
          # not the default branch HEAD.
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA::8}"
          IMAGE_TAG="${SHORT_SHA}-$(date -u +%Y%m%d%H%M%S)"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --file deploy/aws/Dockerfile \
            --tag "${{ steps.image-tag.outputs.image_uri }}" \
            --tag "${{ steps.image-tag.outputs.latest_uri }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            --label "build.run_id=${{ github.run_id }}" \
            .

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.image-tag.outputs.image_uri }}"
          docker push "${{ steps.image-tag.outputs.latest_uri }}"

      - name: Update Lambda function to new image
        id: update-lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --image-uri "${{ steps.image-tag.outputs.image_uri }}" \
            --region "${{ env.AWS_REGION }}" \
            --output json \
          | tee /tmp/update-output.json

      - name: Wait for Lambda update to complete
        run: |
          echo "Waiting for Lambda function update to complete..."
          aws lambda wait function-updated \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --region "${{ env.AWS_REGION }}"
          echo "Lambda function update complete."

      - name: Publish Lambda version and update alias
        id: publish-version
        run: |
          echo "Publishing new Lambda version..."
          VERSION=$(aws lambda publish-version \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Version' \
            --output text)
          echo "Published version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Updating 'live' alias to version ${VERSION}..."
          aws lambda update-alias \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --name live \
            --function-version "${VERSION}" \
            --region "${{ env.AWS_REGION }}" \
          || aws lambda create-alias \
            --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
            --name live \
            --function-version "${VERSION}" \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for provisioned concurrency to stabilize
        run: |
          echo "Checking provisioned concurrency status on alias 'live'..."
          # Poll until provisioned concurrency is ready or timeout after 5 minutes
          END_TIME=$(( $(date +%s) + 300 ))
          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            STATUS=$(aws lambda get-provisioned-concurrency-config \
              --function-name "${{ env.LAMBDA_FUNCTION_NAME }}" \
              --qualifier "live" \
              --region "${{ env.AWS_REGION }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "NONE")
            echo "Provisioned concurrency status: ${STATUS}"
            if [ "$STATUS" = "READY" ] || [ "$STATUS" = "NONE" ]; then
              echo "Lambda is ready."
              break
            fi
            sleep 15
          done

      - name: Smoke test — /health endpoint
        id: smoke-health
        run: |
          ENDPOINT_URL="${{ vars.ENDPOINT_URL }}"
          echo "Testing /health at ${ENDPOINT_URL}/health ..."
          RESPONSE=$(curl --silent --fail --max-time 30 "${ENDPOINT_URL}/health")
          echo "Response: ${RESPONSE}"
          STATUS=$(echo "${RESPONSE}" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('status',''))")
          if [ "$STATUS" != "ok" ]; then
            echo "ERROR: /health did not return status=ok (got: ${STATUS})"
            exit 1
          fi
          echo "PASS: /health returned status=ok"

      - name: Smoke test — MCP initialize handshake
        id: smoke-initialize
        run: |
          ENDPOINT_URL="${{ vars.ENDPOINT_URL }}"
          echo "Testing MCP initialize at ${ENDPOINT_URL}/mcp ..."
          RESPONSE=$(curl --silent --fail --max-time 30 \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{
              "jsonrpc": "2.0",
              "id": 1,
              "method": "initialize",
              "params": {
                "protocolVersion": "2024-11-05",
                "capabilities": {},
                "clientInfo": {"name": "smoke-test", "version": "1.0.0"}
              }
            }' \
            "${ENDPOINT_URL}/mcp")
          echo "Response: ${RESPONSE}"
          # Verify a valid JSON-RPC response with a result field
          HAS_RESULT=$(echo "${RESPONSE}" | python3 -c "import sys, json; d=json.load(sys.stdin); print('yes' if 'result' in d else 'no')" 2>/dev/null || echo "no")
          if [ "$HAS_RESULT" != "yes" ]; then
            echo "ERROR: MCP initialize did not return a result object"
            exit 1
          fi
          echo "PASS: MCP initialize handshake succeeded"

      - name: Smoke test — tools/list returns 21 tools
        id: smoke-tools
        run: |
          ENDPOINT_URL="${{ vars.ENDPOINT_URL }}"
          echo "Testing MCP tools/list at ${ENDPOINT_URL}/mcp ..."
          RESPONSE=$(curl --silent --fail --max-time 30 \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{
              "jsonrpc": "2.0",
              "id": 2,
              "method": "tools/list",
              "params": {}
            }' \
            "${ENDPOINT_URL}/mcp")
          echo "Response (truncated): $(echo "${RESPONSE}" | head -c 500)"
          TOOL_COUNT=$(echo "${RESPONSE}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          tools = d.get('result', {}).get('tools', [])
          print(len(tools))
          " 2>/dev/null || echo "0")
          echo "Tool count: ${TOOL_COUNT}"
          if [ "$TOOL_COUNT" -ne 21 ]; then
            echo "ERROR: tools/list returned ${TOOL_COUNT} tools, expected 21"
            exit 1
          fi
          echo "PASS: tools/list returned 21 tools"

      - name: Write deployment summary
        if: always()
        run: |
          IMAGE_TAG="${{ steps.image-tag.outputs.image_tag }}"
          {
            echo "## Deployment Summary"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Image tag | \`${IMAGE_TAG}\` |"
            echo "| Lambda | \`${{ env.LAMBDA_FUNCTION_NAME }}\` |"
            echo "| Region | \`${{ env.AWS_REGION }}\` |"
            echo "| Triggered by | \`${{ github.actor }}\` |"
            echo ""
            echo "### Smoke Test Results"
            echo ""
            HEALTH_STATUS="${{ steps.smoke-health.outcome }}"
            INIT_STATUS="${{ steps.smoke-initialize.outcome }}"
            TOOLS_STATUS="${{ steps.smoke-tools.outcome }}"
            echo "| Test | Result |"
            echo "| ---- | ------ |"
            echo "| /health | ${HEALTH_STATUS} |"
            echo "| MCP initialize | ${INIT_STATUS} |"
            echo "| tools/list (21 tools) | ${TOOLS_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error title=Deployment Failed::Deploy to ${{ env.LAMBDA_FUNCTION_NAME }} failed. Check the logs above for details."
          echo ""
          echo "## Deployment FAILED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "One or more steps failed. Review the job logs and re-run after fixing the issue." >> "$GITHUB_STEP_SUMMARY"
