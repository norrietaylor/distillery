name: Eval (Nightly)

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch: # allow manual runs

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: pip install -e ".[dev,ragas]"

      - name: Run eval suite
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          # Recover automatically if a stale eval DB on disk was seeded with
          # a different mock embedding model than the one currently
          # configured.  Each scenario already runs in a fresh temp dir, so
          # this is purely a safety net for shared/cached paths.
          DISTILLERY_RESET_STORE_ON_EMBEDDING_MISMATCH: "1"
        run: pytest -m eval -v --tb=short

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_id }}
          path: |
            eval_results/
            baseline*.json
          retention-days: 30
          if-no-files-found: ignore
