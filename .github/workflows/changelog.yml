name: Update Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: "2.12.0"
          GIT_CLIFF_SHA512: "b96f9795b826dcf75d921122279869536cd305f536639a58146d372f16c34ea80105aaad8bb3e57279c361ea18239ce39e4436a941d4d27694618b00007c528c"
        run: |
          set -euo pipefail
          tarball="git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/${tarball}"
          curl -fsSL "${url}" -o git-cliff.tar.gz
          echo "${GIT_CLIFF_SHA512}  git-cliff.tar.gz" | sha512sum -c -
          tar -xzf git-cliff.tar.gz git-cliff
          sudo install -m 0755 git-cliff /usr/local/bin/git-cliff

      - name: Generate changelog
        run: git-cliff --output CHANGELOG.md

      - name: Commit changelog
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
            exit 0
          fi
          git commit -m "docs: update changelog for ${{ github.event.release.tag_name }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
