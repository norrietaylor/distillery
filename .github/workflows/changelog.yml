name: Update Changelog

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: "2.12.0"
          GIT_CLIFF_SHA512: "b96f9795b826dcf75d921122279869536cd305f536639a58146d372f16c34ea80105aaad8bb3e57279c361ea18239ce39e4436a941d4d27694618b00007c528c"
        run: |
          set -euo pipefail
          tarball="git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/${tarball}"
          curl -fsSL "${url}" -o git-cliff.tar.gz
          echo "${GIT_CLIFF_SHA512}  git-cliff.tar.gz" | sha512sum -c -
          tar -xzf git-cliff.tar.gz --strip-components=1 --wildcards '*/git-cliff'
          sudo install -m 0755 git-cliff /usr/local/bin/git-cliff

      - name: Generate changelog
        run: git-cliff --output CHANGELOG.md

      - name: Create changelog PR
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7
        with:
          commit-message: "docs: update changelog for ${{ github.event.release.tag_name }}"
          title: "docs: update changelog for ${{ github.event.release.tag_name }}"
          body: "Auto-generated changelog update from release ${{ github.event.release.tag_name }}."
          branch: "docs/changelog-${{ github.event.release.tag_name }}"
          base: ${{ github.event.repository.default_branch }}
          add-paths: CHANGELOG.md
