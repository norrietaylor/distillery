name: Eval (PR)

on:
  pull_request:
    branches:
      - main

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          npm install -g @anthropic-ai/claude-code

      - name: Validate promptfoo config
        run: npx promptfoo@latest validate config --config promptfooconfig.yaml

      - name: Run promptfoo eval
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: |
          npx promptfoo@latest eval --config promptfooconfig.yaml
          echo "eval_exit_code=$?" >> "$GITHUB_ENV"

      - name: Report eval results
        if: ${{ always() && env.eval_exit_code != '' }}
        run: |
          if [ "$eval_exit_code" = "0" ]; then
            echo "✅ All promptfoo eval scenarios passed"
          else
            echo "⚠️ Some promptfoo eval scenarios failed (exit code: $eval_exit_code)"
            echo "This is informational — eval failures do not block merge."
            echo "Review results in the workflow logs above."
          fi
