name: Eval (PR)

on:
  pull_request:
    branches:
      - main

jobs:
  # Hard gate — validates config syntax, always blocks merge on failure.
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate promptfoo config
        run: npx promptfoo@0.118.0 validate config --config promptfooconfig.yaml

  # Informational — runs live eval, does not block merge.
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !cancelled() }}
    needs: validate
    continue-on-error: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          npm install -g @anthropic-ai/claude-code

      - name: Run promptfoo eval
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: npx promptfoo@0.118.0 eval --config promptfooconfig.yaml
