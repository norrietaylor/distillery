<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#fafafa" rx="0"/>

  <!-- Subtle top accent bar -->
  <rect width="1280" height="4" fill="#BA7517"/>

  <!-- Logo (inline from distillery-logo-light.svg, scaled and positioned) -->
  <g transform="translate(490, 80) scale(0.45)">
    <circle cx="196" cy="320" r="115" fill="none" stroke="#1a1a1a" stroke-width="13"/>
    <line x1="196" y1="205" x2="196" y2="68" stroke="#1a1a1a" stroke-width="13" stroke-linecap="round"/>
    <line x1="196" y1="88" x2="248" y2="88" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
    <line x1="196" y1="122" x2="236" y2="122" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
    <path d="M196,68 Q196,38 226,38 L370,38 Q400,38 400,68 L400,200" fill="none" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M400,230 Q389,248 400,268 Q411,248 400,230 Z" fill="#BA7517"/>
    <path d="M120,370 Q130,410 196,415 Q262,410 272,370 Q255,345 196,350 Q137,345 120,370 Z" fill="#BA7517"/>
  </g>

  <!-- Title -->
  <text x="640" y="370" text-anchor="middle" fill="#1a1a1a" font-size="64" font-weight="700" letter-spacing="-1.5">Distillery</text>

  <!-- Tagline -->
  <text x="640" y="420" text-anchor="middle" fill="#666" font-size="28" font-weight="300">Team Knowledge, Distilled</text>

  <!-- Description -->
  <text x="640" y="480" text-anchor="middle" fill="#BA7517" font-size="20" font-weight="400">A team knowledge base powered by Claude Code</text>

  <!-- Skill pills row -->
  <g transform="translate(640, 530)" text-anchor="middle">
    <rect x="-540" y="0" width="72" height="28" rx="6" fill="#ececec"/>
    <text x="-504" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/distill</text>

    <rect x="-456" y="0" width="62" height="28" rx="6" fill="#ececec"/>
    <text x="-425" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/recall</text>

    <rect x="-382" y="0" width="54" height="28" rx="6" fill="#ececec"/>
    <text x="-355" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/pour</text>

    <rect x="-316" y="0" width="82" height="28" rx="6" fill="#ececec"/>
    <text x="-275" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/bookmark</text>

    <rect x="-222" y="0" width="74" height="28" rx="6" fill="#ececec"/>
    <text x="-185" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/minutes</text>

    <rect x="-136" y="0" width="70" height="28" rx="6" fill="#ececec"/>
    <text x="-101" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/classify</text>

    <rect x="-54" y="0" width="60" height="28" rx="6" fill="#ececec"/>
    <text x="-24" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/watch</text>

    <rect x="18" y="0" width="58" height="28" rx="6" fill="#ececec"/>
    <text x="47" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/radar</text>

    <rect x="88" y="0" width="54" height="28" rx="6" fill="#ececec"/>
    <text x="115" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/tune</text>

    <rect x="154" y="0" width="58" height="28" rx="6" fill="#ececec"/>
    <text x="183" y="19" fill="#1a1a1a" font-size="12" font-weight="500">/setup</text>
  </g>

  <!-- Bottom accent bar -->
  <rect y="636" width="1280" height="4" fill="#BA7517"/>
</svg>
