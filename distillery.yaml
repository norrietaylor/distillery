# Horizon-ready configuration — MotherDuck provides shared cloud storage so
# all Horizon replicas read from and write to the same DuckDB database.
# MOTHERDUCK_TOKEN is injected by Horizon from the secrets dashboard.
storage:
  backend: motherduck
  database_path: md:distillery
  motherduck_token_env: MOTHERDUCK_TOKEN

embedding:
  provider: jina
  model: jina-embeddings-v3
  dimensions: 1024
  api_key_env: JINA_API_KEY

team:
  name: ""

classification:
  confidence_threshold: 0.6
  dedup_skip_threshold: 0.95
  dedup_merge_threshold: 0.80
  dedup_link_threshold: 0.60
  dedup_limit: 5

tags:
  enforce_namespaces: false
  reserved_prefixes: []

# GitHub OAuth for HTTP transport.
# When deployed to Horizon, the Horizon Gateway layers additional RBAC on top
# of the GitHubProvider below.  GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET are
# injected by Horizon from the secrets dashboard.
server:
  auth:
    provider: github
    client_id_env: GITHUB_CLIENT_ID
    client_secret_env: GITHUB_CLIENT_SECRET
