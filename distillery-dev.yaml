# Development Distillery configuration — local-only with no authentication.
#
# Purpose: This is the development configuration for running Distillery locally during
# testing and development. It uses a local DuckDB file for storage (no cloud dependencies)
# and no authentication (open access for convenience).
#
# For production deployment configs, see https://github.com/norrietaylor/distill_ops
#
storage:
  backend: duckdb
  database_path: "/tmp/distillery-dev.db"

embedding:
  provider: jina
  model: jina-embeddings-v3
  dimensions: 1024
  api_key_env: JINA_API_KEY

team:
  name: distillery-dev

# Optional: Jina Reader API enrichment for RSS feeds (issue #403).
# When enabled, the poller fetches full article markdown via
# https://r.jina.ai/<url> for RSS items whose <description> is shorter
# than ``min_content_chars``. The original RSS description is preserved
# in ``metadata.original_content``. Disabled by default.
# feeds:
#   reader:
#     enabled: true
#     api_key_env: JINA_API_KEY     # reused from embedding provider
#     min_content_chars: 500
#     timeout_seconds: 30.0
#     max_retries: 2
#     concurrency: 5

server:
  auth:
    provider: none            # open access for dev testing
