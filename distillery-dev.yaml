# Development Distillery configuration — local-only with no authentication.
#
# Purpose: This is the development configuration for running Distillery locally during
# testing and development. It uses a local DuckDB file for storage (no cloud dependencies)
# and no authentication (open access for convenience).
#
# For production deployment, see deploy/prefect/distillery.yaml (Horizon/MotherDuck)
# or deploy/fly/distillery-fly.yaml (Fly.io/local DuckDB).
#
storage:
  backend: duckdb
  database_path: "/tmp/distillery-dev.db"

embedding:
  provider: jina
  model: jina-embeddings-v3
  dimensions: 1024
  api_key_env: JINA_API_KEY

team:
  name: distillery-dev

server:
  auth:
    provider: none            # open access for dev testing
